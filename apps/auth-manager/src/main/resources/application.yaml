spring:
  application:
    name: auth-manager
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate     # Flyway owns the schema; Hibernate must not touch it
    properties:
      hibernate.default_schema: auth_manager
  flyway:
    enabled: true
    schemas: auth_manager
    default-schema: auth_manager
    create-schemas: true
    locations: classpath:db/migration
  data:
    redis:
      timeout: 2s
      connect-timeout: 2s

server:
  port: 8080
  shutdown: graceful
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

logging:
  level:
    root: INFO
    io.mcpmesh.auth: DEBUG
    org.flywaydb: INFO
    org.springframework.web: INFO

# Cloudflare API credentials for tenant-hostname auto-provisioning. When unset
# (no `cloudflare-api` Secret present) CloudflareTunnelService logs a WARN and
# skips — operator can fall back to scripts/cf-setup-tunnel.sh.
cloudflare:
  api-token: ${CF_API_TOKEN:}
  account-id: ${CF_ACCOUNT_ID:}
  tunnel-id: ${CF_TUNNEL_ID:}

# Per-realm SMTP defaults applied to every tenant KC realm by
# SmtpConfigBootstrap (see io.mcpmesh.auth.manager.email). Defaults route
# through the in-cluster smtp-relay service which forwards to SendGrid using
# the platform API key. Override `enabled: false` in profiles where realms
# should keep their seeded SMTP config (e.g. local-dev MailHog).
auth-manager:
  smtp:
    host: ${AUTH_MANAGER_SMTP_HOST:smtp-relay.auth-platform.svc.cluster.local}
    port: ${AUTH_MANAGER_SMTP_PORT:25}
    from-address: ${AUTH_MANAGER_SMTP_FROM:noreply@mcp-mesh.io}
    from-display-name-template: "{tenantDisplayName}"
    enabled: ${AUTH_MANAGER_SMTP_ENABLED:true}
    # SendGrid API key used by TenantDomainAuthService to register / validate
    # per-tenant whitelabel domains. Mounted from the same `sendgrid-api`
    # Secret the smtp-relay uses (key=api-key). Optional: empty when SendGrid
    # is not configured (domain-auth endpoints surface a clean error).
    sendgrid-api-key: ${SENDGRID_API_KEY:}
  # Per-tenant rate limit / daily quota for the app-facing email send API
  # (POST /api/v1/tenants/{id}/emails/{typeKey}). Fixed-window Redis counters;
  # best-effort reputation protection that fails open if Redis is down.
  # Platform-wide defaults today; per-tenant overrides are a future enhancement.
  email:
    rate-limit:
      per-minute: ${AUTH_MANAGER_EMAIL_RL_PER_MINUTE:100}
      per-day: ${AUTH_MANAGER_EMAIL_RL_PER_DAY:5000}
      enabled: ${AUTH_MANAGER_EMAIL_RL_ENABLED:true}
  # Theme-apply uses ThemeApplier to patch the Keycloak StatefulSet's
  # rolling-restart annotation. STS name varies per env (Bitnami names it
  # <release>-keycloak); dev overrides to "platform-kc-dev-keycloak".
  theme:
    kc-statefulset-name: ${AUTH_MANAGER_THEME_KC_STATEFULSET_NAME:platform-kc-keycloak}
  # URLs embedded in tenant onboarding bundles (README, .env.example, the
  # in-cluster admin-API code samples, etc.). Env-aware so dev downloads
  # reference auth-dev.mcp-mesh.io + the dev-namespace service DNS.
  bundle:
    kc-base: ${AUTH_MANAGER_BUNDLE_KC_BASE:https://auth.mcp-mesh.io/auth}
    admin-base: ${AUTH_MANAGER_BUNDLE_ADMIN_BASE:https://auth.mcp-mesh.io/admin}
    auth-mgr-incluster-base: ${AUTH_MANAGER_BUNDLE_AUTH_MGR_INCLUSTER_BASE:http://auth-platform-auth-manager.auth-platform.svc.cluster.local:8080}
    # Public auth-manager base for backends running OUTSIDE the cluster
    # (local dev, external services). Embedded in bundle docs/.env and
    # served to the admin-UI via GET /api/v1/bundle/bases.
    auth-mgr-public-base: ${AUTH_MANAGER_BUNDLE_AUTH_MGR_PUBLIC_BASE:https://auth.mcp-mesh.io}

# CNPG superuser connection: used by TenantDatabaseService to run CREATE
# DATABASE / DROP DATABASE DDL when provisioning per-tenant databases on
# the shared platform-pg cluster. Points at the maintenance `postgres`
# database, NOT at our own `authmanager` database (which is what
# spring.datasource.* is wired to). Password is injected via env from the
# K8s Secret `platform-pg-superuser-secret` (created by CNPG).
platform-pg:
  superuser:
    url: ${PLATFORM_PG_SUPERUSER_URL:jdbc:postgresql://platform-pg-rw.auth-platform.svc.cluster.local:5432/postgres}
    username: ${PLATFORM_PG_SUPERUSER_USERNAME:postgres}
    password: ${CNPG_SUPERUSER_PASSWORD:}
