name: auth-platform-dev

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: dev
      POSTGRES_MULTIPLE_DATABASES: "authmanager,keycloak"
    volumes:
      - ./seed/postgres-init.sh:/docker-entrypoint-initdb.d/01-create-dbs.sh:ro
      - pgdata:/var/lib/postgresql/data
    ports: ["15432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      retries: 20

  redis:
    image: redis:7-alpine
    ports: ["16379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    command:
      - start-dev
      - --import-realm
      - --http-port=8180
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: dev
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./seed/realm.json:/opt/keycloak/data/import/realm.json:ro
    ports: ["8180:8180"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000 && exec 3>&-"]
      interval: 5s
      retries: 30
      start_period: 15s

  openresty:
    build:
      context: ..
      dockerfile: dev/openresty/Dockerfile
    ports: ["8090:80"]
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      # Cross-cutting platform targets (overrideable). auth-manager and admin-ui
      # run on the host machine in local dev, so they're reached via
      # host.docker.internal. Keycloak runs in compose at keycloak:8180.
      PLATFORM_ADMIN_API_TARGET: "host.docker.internal:8080"
      PLATFORM_ADMIN_UI_TARGET:  "host.docker.internal:8080"
      PLATFORM_KC_TARGET:        "keycloak:8180"
    depends_on:
      redis:
        condition: service_healthy

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # web UI

volumes:
  pgdata:
