worker_processes 1;
error_log /dev/stderr info;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

env REDIS_HOST;
env REDIS_PORT;

http {
    include       mime.types;
    default_type  application/octet-stream;
    access_log    /dev/stdout;
    sendfile      on;
    keepalive_timeout 65;

    lua_package_path "/usr/local/openresty/nginx/lua/?.lua;;";
    lua_shared_dict route_cache 10m;

    server {
        listen      80 default_server;
        server_name _;

        location = /health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        location = /__debug/redis {
            access_log off;
            content_by_lua_block {
                ngx.say("REDIS_HOST=", os.getenv("REDIS_HOST") or "(unset)")
                ngx.say("REDIS_PORT=", os.getenv("REDIS_PORT") or "(unset)")
            }
        }

        # All other paths: look up tenant by Host header in Redis, then proxy.
        location / {
            set $route_backend "";
            access_by_lua_file lua/route.lua;

            proxy_set_header Host             $host;
            proxy_set_header X-Real-IP        $remote_addr;
            proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_pass http://$route_backend;
        }
    }
}
