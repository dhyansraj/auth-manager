worker_processes 1;
error_log /dev/stderr info;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

env REDIS_HOST;
env REDIS_PORT;
env REDIS_SENTINEL_ENABLED;
env REDIS_SENTINEL_MASTER;
env PLATFORM_ADMIN_API_TARGET;
env PLATFORM_ADMIN_UI_TARGET;
env PLATFORM_KC_TARGET;
env PLATFORM_HOST;
env ROUTE_DEFAULT_MAX_BODY_MB;

http {
    include       mime.types;
    default_type  application/octet-stream;
    access_log    /dev/stdout;
    sendfile      on;
    keepalive_timeout 65;

    # Absolute upper bound for request body size, applied to all platform-edge
    # traffic. 100MB matches the Cloudflare Free tunnel hard ceiling — anything
    # larger gets rejected at the CF edge anyway, so accepting more here would
    # just waste bandwidth before nginx hits the same wall.
    #
    # Per-route caps (RoutingRule.maxBodyMb, default 25MB) are enforced earlier
    # in lua/router.lua by reading Content-Length BEFORE forwarding upstream;
    # this directive is the backstop for requests that slip past the lua check
    # (e.g. chunked uploads without Content-Length).
    client_max_body_size 100m;

    # Cosocket DNS is independent of libc and must be configured explicitly.
    # The resolver address is injected per-environment via $NGINX_RESOLVER
    # (substituted at container start by docker-entrypoint.sh using envsubst):
    #   - 127.0.0.11   : Docker's embedded DNS (compose / user-defined nets)
    #   - 10.43.0.10   : k3s default cluster DNS (kube-dns/coredns ClusterIP).
    # Listing both here caused intermittent "Connection refused" 503s in k3s
    # when nginx happened to query 127.0.0.11. IPv6 off avoids spurious AAAA
    # lookups; results cached for `valid=` seconds.
    resolver ${NGINX_RESOLVER} ipv6=off valid=30s;

    lua_package_path "/usr/local/openresty/nginx/lua/?.lua;;";
    lua_shared_dict route_cache 10m;

    # WebSocket support: nginx must forward the Upgrade + Connection headers
    # verbatim from the client to the upstream. The Connection header value
    # depends on whether the request is upgrade-bound:
    #   - request has Upgrade: websocket   → Connection: upgrade
    #   - regular HTTP request (no Upgrade) → Connection: close
    # This map computes that automatically. Used in every proxy_set_header
    # Connection $connection_upgrade below.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # External request scheme behind the Cloudflare tunnel. The tunnel→edge hop
    # is plain HTTP (so $scheme is "http"), but client→Cloudflare is HTTPS.
    # Cloudflare forwards the original scheme via X-Forwarded-Proto and/or the
    # CF-Visitor header. We must surface the REAL scheme to upstreams —
    # Keycloak especially: when it sees http it refuses to set Secure cookies,
    # and SameSite=None (required for Apple's cross-origin form_post callback)
    # needs Secure. Prefer X-Forwarded-Proto, then CF-Visitor, then $scheme.
    map $http_cf_visitor $cf_visitor_scheme {
        default                  $scheme;
        "~\"scheme\":\"https\""  https;
        "~\"scheme\":\"http\""   http;
    }
    map $http_x_forwarded_proto $fwd_proto {
        default  $cf_visitor_scheme;
        https    https;
        http     http;
    }

    server {
        listen      80 default_server;
        server_name _;

        location = /health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        location = /__debug/redis {
            access_log off;
            content_by_lua_block {
                ngx.say("REDIS_HOST=", os.getenv("REDIS_HOST") or "(unset)")
                ngx.say("REDIS_PORT=", os.getenv("REDIS_PORT") or "(unset)")
                ngx.say("PLATFORM_ADMIN_API_TARGET=", os.getenv("PLATFORM_ADMIN_API_TARGET") or "(unset)")
                ngx.say("PLATFORM_ADMIN_UI_TARGET=",  os.getenv("PLATFORM_ADMIN_UI_TARGET")  or "(unset)")
                ngx.say("PLATFORM_KC_TARGET=",        os.getenv("PLATFORM_KC_TARGET")        or "(unset)")
                ngx.say("PLATFORM_HOST=",             os.getenv("PLATFORM_HOST")             or "(unset)")
            }
        }

        # Internal subrequest target used by lua/bff.lua to POST to Keycloak's
        # token endpoint without pulling in lua-resty-http. The URI passed to
        # ngx.location.capture is /_bff_int/kc_token/<realm>/token; nginx
        # captures <realm> and forwards to KC's
        # /realms/<realm>/protocol/openid-connect/token.
        location ~ ^/_bff_int/kc_token/([^/]+)/token$ {
            internal;
            set $bff_realm $1;
            set_by_lua_block $bff_kc_target {
                return os.getenv("PLATFORM_KC_TARGET") or "keycloak:8180"
            }

            proxy_set_header Host $host;
            proxy_set_header Content-Type "application/x-www-form-urlencoded";
            proxy_set_header X-Forwarded-Proto $fwd_proto;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_pass http://$bff_kc_target/realms/$bff_realm/protocol/openid-connect/token;
        }

        # Internal subrequest target used by lua/bff.lua to POST to Keycloak's
        # end-session endpoint during /_bff/logout. Mirrors the kc_token
        # location above. Captures <realm> from the URI and forwards to KC's
        # /realms/<realm>/protocol/openid-connect/logout. Body is the form-
        # encoded {client_id, refresh_token} pair that signals "user really
        # signed out" — KC then terminates the SSO session and back-channel-
        # POSTs every other client registered with a backchannel.logout.url.
        location ~ ^/_bff_int/kc_logout/([^/]+)$ {
            internal;
            set $bff_realm $1;
            set_by_lua_block $bff_kc_target {
                return os.getenv("PLATFORM_KC_TARGET") or "keycloak:8180"
            }

            proxy_set_header Host $host;
            proxy_set_header Content-Type "application/x-www-form-urlencoded";
            proxy_set_header X-Forwarded-Proto $fwd_proto;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_pass http://$bff_kc_target/realms/$bff_realm/protocol/openid-connect/logout;
        }

        # All other paths: cross-cutting platform routes first, then per-tenant
        # rule lookup via Redis (route:<slug>). See lua/router.lua for the flow.
        location / {
            set $route_backend "";
            access_by_lua_file lua/router.lua;

            proxy_set_header Host             $host;
            proxy_set_header X-Real-IP        $remote_addr;
            proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $fwd_proto;

            # WebSocket pass-through: forward Upgrade/Connection so the
            # protocol switch reaches the tenant backend. Harmless for
            # regular HTTP (Connection becomes "close" via the http-level
            # map directive).
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;

            # SSE pass-through: nginx must stream, not buffer the response
            # body until end-of-connection. Off here applies to ALL traffic
            # through this location — tradeoff is marginal latency on small
            # responses for guaranteed streaming on event-stream responses.
            # If a tenant prefers per-response control, they can emit
            # `X-Accel-Buffering: no` on their SSE endpoints which nginx
            # honors regardless of this setting.
            proxy_buffering off;
            proxy_cache     off;

            # Long-lived connection support (WebSocket keepalives, SSE
            # streams). Default 60s drops idle WS connections + breaks
            # SSE streams that go quiet for >60s. 1hr is a sensible cap;
            # backends should still send their own keepalive frames.
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;

            proxy_pass http://$route_backend;
        }
    }
}
