# CloudNativePG cluster for the auth platform.
#
# 3 instances spread across nodes via anti-affinity. Primary + 2 hot standbys
# with synchronous replication (minSyncReplicas=1) so writes don't ack until
# at least one replica has the WAL — survives primary loss without data loss.
#
# Connection endpoints (services auto-created by the operator):
#   platform-pg-rw  → read/write (primary)
#   platform-pg-ro  → read-only (replicas, load-balanced)
#   platform-pg-r   → any (primary or replica, useful for reads that tolerate
#                     small replication lag)
#
# Bootstrap creates the `authmanager` database + user. The `keycloak` database
# is created post-bootstrap via the standalone Job in keycloak-db-create.yaml
# (CNPG bootstrap.initdb only supports a single database).
#
# Credentials live in K8s Secrets managed out-of-band, NOT in this manifest.
# Operator PRE-CREATES both secrets before applying this manifest:
#   - platform-pg-app-secret      (bootstrap.initdb owner creds for `authmanager`)
#   - platform-pg-superuser-secret (the `postgres` superuser creds)
# Both MUST be type kubernetes.io/basic-auth with keys `username` + `password`.
# The superuser secret needs username: postgres and a strong password, e.g.:
#   kubectl create secret generic platform-pg-superuser-secret -n auth-platform \
#     --type=kubernetes.io/basic-auth \
#     --from-literal=username=postgres --from-literal=password='<strong>'
#
# With enableSuperuserAccess: true AND this operator-owned (user-supplied)
# superuser secret, CNPG keeps the `postgres` role's DB password in sync with
# the secret on every reconcile and does NOT rotate/regenerate it. This is what
# eliminates the #92 drift: the old manual `ALTER USER postgres WITH PASSWORD`
# pre-step before every helm upgrade is no longer needed once migrated.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: platform-pg
  namespace: auth-platform
spec:
  instances: 3

  imageName: ghcr.io/cloudnative-pg/postgresql:18.4

  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "256MB"

  bootstrap:
    initdb:
      database: authmanager
      owner: authmanager
      secret:
        name: platform-pg-app-secret

  # Pin the `postgres` superuser password to an operator-owned secret. Without
  # this (CNPG ≥1.21 defaults enableSuperuserAccess: false), CNPG disables the
  # superuser password and re-asserts that on every reconcile → #92 drift.
  enableSuperuserAccess: true
  superuserSecret:
    name: platform-pg-superuser-secret

  storage:
    size: 10Gi
    storageClass: longhorn

  # Anti-affinity: never schedule two PG instances on the same node. With 5
  # nodes available and 3 instances, the scheduler spreads them across three
  # distinct nodes.
  affinity:
    enablePodAntiAffinity: true
    topologyKey: kubernetes.io/hostname
    podAntiAffinityType: required

  # Synchronous replication: writes wait for at least one replica's ack before
  # returning. Trades a small latency hit for zero-RPO failover.
  minSyncReplicas: 1
  maxSyncReplicas: 1

  monitoring:
    enablePodMonitor: false  # no Prometheus stack on this cluster yet

  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
