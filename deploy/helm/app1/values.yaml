# Global defaults for the app1 tenant chart. Override per-environment via values-<env>.yaml.

global:
  imageRegistry: ""                # set per env, e.g. "192.168.10.1:5000"

# ───── app1-backend (Spring Boot + auth-lib v2) ─────
# Service name MUST stay literally "app1-backend" so it matches the route
# default generated by RoutingConfigService.defaultFor()
# (app1-backend.tenant-app1.svc.cluster.local:8080).
backend:
  enabled: true
  image:
    repository: app1-backend
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  replicas: 1
  service:
    type: ClusterIP
    port: 8080
  config:
    # Issuer URI that backends use to fetch JWKS + validate iss claim.
    # Must match the iss claim Keycloak mints for the realm (KC_HOSTNAME +
    # /realms/<realm>), i.e. https://auth.mcp-mesh.io/auth/realms/t-app1.
    authLibIssuerUri: "https://auth.mcp-mesh.io/auth/realms/t-app1"
    authLibClientId: "orders"
    # Client secret for the 'orders' confidential client. Empty by default;
    # populated by values-<env>.yaml or by an external Secret.
    authLibClientSecret: ""
  resources:
    requests:
      cpu: "100m"
      memory: "384Mi"
    limits:
      cpu: "500m"
      memory: "768Mi"

# ───── app1-ui (Vite + React + Tailwind, served via nginx) ─────
ui:
  enabled: true
  image:
    repository: app1-ui
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  replicas: 1
  service:
    type: ClusterIP
    port: 80
