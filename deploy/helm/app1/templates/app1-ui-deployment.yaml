{{- if .Values.ui.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  # Bare name "app1-ui" -- matches RoutingConfigService.defaultFor():
  # app1-ui.tenant-app1.svc.cluster.local:80
  name: app1-ui
  labels:
    {{- include "app1.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  replicas: {{ .Values.ui.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: ui
  template:
    metadata:
      labels:
        {{- include "app1.labels" . | nindent 8 }}
        app.kubernetes.io/component: ui
    spec:
      containers:
        - name: app1-ui
          image: {{ include "app1.image" (dict "global" .Values.global "repository" .Values.ui.image.repository "tag" .Values.ui.image.tag) }}
          imagePullPolicy: {{ .Values.ui.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
{{- end }}
