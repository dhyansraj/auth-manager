# Overrides for beelink k3s deployment.

global:
  imageRegistry: "192.168.10.1:5000"

backend:
  image:
    repository: app1-backend
    tag: "0.1.0"
  config:
    authLibIssuerUri: "https://auth.mcp-mesh.io/auth/realms/t-app1"
    authLibClientId: "orders"
    # The 'orders' client secret is auto-generated by Keycloak when the app
    # is created via the auth-manager API. The provision script injects it
    # at install time with --set "backend.config.authLibClientSecret=<...>".
    authLibClientSecret: ""

ui:
  image:
    repository: app1-ui
    tag: "0.1.0"
