{{- if .Values.platformEdge.enabled }}
{{- $fullname := include "auth-platform.fullname" . -}}
{{- $adminApi := default (printf "%s-auth-manager:8080" $fullname) .Values.platformEdge.config.adminApiTarget -}}
{{- $adminUi  := default (printf "%s-admin-ui:80" $fullname)      .Values.platformEdge.config.adminUiTarget -}}
{{- $kc       := default "platform-kc-keycloak:80"                .Values.platformEdge.config.kcTarget -}}
{{- $platformHost := default "auth.mcp-mesh.io"                   .Values.platformEdge.config.platformHost -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}-platform-edge
  labels:
    {{- include "auth-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: platform-edge
spec:
  replicas: {{ .Values.platformEdge.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: platform-edge
  template:
    metadata:
      labels:
        {{- include "auth-platform.labels" . | nindent 8 }}
        app.kubernetes.io/component: platform-edge
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/instance: {{ .Release.Name }}
                    app.kubernetes.io/component: platform-edge
      containers:
        - name: platform-edge
          image: {{ include "auth-platform.image" (dict "global" .Values.global "repository" .Values.platformEdge.image.repository "tag" .Values.platformEdge.image.tag) }}
          imagePullPolicy: {{ .Values.platformEdge.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: 80
          env:
            - name: REDIS_HOST
              value: {{ required "platformEdge.config.redisHost must be set" .Values.platformEdge.config.redisHost | quote }}
            - name: REDIS_PORT
              value: {{ .Values.platformEdge.config.redisPort | default 6379 | quote }}
            - name: REDIS_SENTINEL_ENABLED
              value: {{ .Values.platformEdge.config.redisSentinelEnabled | default false | quote }}
            - name: REDIS_SENTINEL_MASTER
              value: {{ .Values.platformEdge.config.redisSentinelMaster | default "mymaster" | quote }}
            - name: PLATFORM_ADMIN_API_TARGET
              value: {{ $adminApi | quote }}
            - name: PLATFORM_ADMIN_UI_TARGET
              value: {{ $adminUi | quote }}
            - name: PLATFORM_KC_TARGET
              value: {{ $kc | quote }}
            - name: PLATFORM_HOST
              value: {{ $platformHost | quote }}
            - name: KC_BROWSER_HOST
              value: {{ default $platformHost .Values.platformEdge.config.kcBrowserHost | quote }}
            - name: PLATFORM_REALM
              value: {{ default "dev" .Values.platformEdge.config.platformRealm | quote }}
            - name: ROUTE_DEFAULT_MAX_BODY_MB
              value: {{ .Values.platformEdge.config.routeDefaultMaxBodyMb | default 25 | quote }}
            - name: NGINX_RESOLVER
              value: {{ required "platformEdge.config.nginxResolver must be set (e.g. 10.43.0.10 for k3s)" .Values.platformEdge.config.nginxResolver | quote }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.platformEdge.resources | nindent 12 }}
{{- end }}
