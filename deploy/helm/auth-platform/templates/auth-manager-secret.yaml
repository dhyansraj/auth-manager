{{- if .Values.authManager.enabled }}
{{- /*
  Credential preservation:
  - If the operator sets .Values.postgresql.auth.password / .Values.keycloak.auth.adminPassword
    explicitly (via --set or values overlay), use that value.
  - Otherwise, look up the existing secret in-cluster and preserve whatever
    is already there. This means a rotated password (kubectl patch secret) is
    NOT clobbered by subsequent `helm upgrade` calls that omit the password.
  - On fresh install (no existing secret + no override), the default value
    from values.yaml is used (typically a bootstrap placeholder).
  - This treats helm as a deployment tool, NOT the source of truth for secrets.
    Operators manage credentials out-of-band; helm just provisions the initial value.
*/}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace (printf "%s-auth-manager" .Release.Name) }}
{{- $existingPg := "" }}
{{- $existingKc := "" }}
{{- if $existing }}
  {{- if hasKey $existing.data "postgres-password" }}
    {{- $existingPg = index $existing.data "postgres-password" | b64dec }}
  {{- end }}
  {{- if hasKey $existing.data "keycloak-admin-password" }}
    {{- $existingKc = index $existing.data "keycloak-admin-password" | b64dec }}
  {{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-auth-manager
  labels: {{- include "auth-platform.labels" . | nindent 4 }}
type: Opaque
stringData:
  postgres-password: {{ coalesce .Values.postgresql.auth.password $existingPg "" | quote }}
  keycloak-admin-password: {{ coalesce .Values.keycloak.auth.adminPassword $existingKc "" | quote }}
{{- end }}
