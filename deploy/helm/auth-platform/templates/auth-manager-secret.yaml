{{- if .Values.authManager.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-auth-manager
  labels: {{- include "auth-platform.labels" . | nindent 4 }}
type: Opaque
stringData:
  postgres-password: {{ .Values.postgresql.auth.password | quote }}
  keycloak-admin-password: {{ .Values.keycloak.auth.adminPassword | quote }}
{{- end }}
