{{- if .Values.authManager.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-auth-manager
  labels:
    {{- include "auth-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: auth-manager
spec:
  replicas: {{ .Values.authManager.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: auth-manager
  template:
    metadata:
      labels:
        {{- include "auth-platform.labels" . | nindent 8 }}
        app.kubernetes.io/component: auth-manager
    spec:
      serviceAccountName: {{ .Release.Name }}-auth-manager
      # Spread replicas across nodes when possible (preferred, not required —
      # if all suitable nodes are taken, scheduler still places the pod).
      # Pairs with .Values.authManager.replicas >= 2 for true app-tier HA.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/instance: {{ .Release.Name }}
                    app.kubernetes.io/component: auth-manager
      containers:
        - name: auth-manager
          image: {{ include "auth-platform.image" (dict "global" .Values.global "repository" .Values.authManager.image.repository "tag" .Values.authManager.image.tag) }}
          imagePullPolicy: {{ .Values.authManager.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.authManager.config.serverPort }}
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: {{ .Values.authManager.config.activeProfile | quote }}
            - name: SPRING_CONFIG_ADDITIONAL_LOCATION
              value: file:/config/
            {{- if .Values.authManager.config.smtpHost }}
            # SMTP host override — used when this release runs in a non-prod
            # namespace and needs to point at prod's smtp-relay via cross-
            # namespace DNS (smtp-relay.<prod-ns>.svc.cluster.local).
            - name: AUTH_MANAGER_SMTP_HOST
              value: {{ .Values.authManager.config.smtpHost | quote }}
            {{- end }}
            # KC StatefulSet name patched by ThemeApplier on theme upload. Must
            # match the actual KC release name in the deployment namespace.
            # Same value the RBAC Role's resourceNames list scopes to.
            - name: AUTH_MANAGER_THEME_KC_STATEFULSET_NAME
              value: {{ .Values.authManager.kcStatefulSetName | default "platform-kc-keycloak" | quote }}
            # URLs embedded in tenant onboarding bundles. Defaults to prod
            # values from chart values.yaml; dev overrides to the auth-dev
            # hostnames + dev-namespace service DNS so dev bundles are usable
            # without manual find/replace.
            - name: AUTH_MANAGER_BUNDLE_KC_BASE
              value: {{ .Values.authManager.config.bundleKcBase | default "https://auth.mcp-mesh.io/auth" | quote }}
            - name: AUTH_MANAGER_BUNDLE_ADMIN_BASE
              value: {{ .Values.authManager.config.bundleAdminBase | default "https://auth.mcp-mesh.io/admin" | quote }}
            - name: AUTH_MANAGER_BUNDLE_AUTH_MGR_INCLUSTER_BASE
              value: {{ .Values.authManager.config.bundleAuthMgrInClusterBase | default "http://auth-platform-auth-manager.auth-platform.svc.cluster.local:8080" | quote }}
            - name: AUTH_MANAGER_BUNDLE_AUTH_MGR_PUBLIC_BASE
              value: {{ .Values.authManager.config.bundleAuthMgrPublicBase | default "https://auth.mcp-mesh.io" | quote }}
            # Namespace used by ThemeStorage / ThemeApplier when talking to
            # the Kubernetes API. Sourced from the downward API so the same
            # image works in any namespace.
            - name: MCPMESH_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-auth-manager
                  key: postgres-password
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-auth-manager
                  key: keycloak-admin-password
            # Platform-level OAuth provider creds (Google + GitHub).
            # The `platform-oauth-providers` Secret is created out-of-band by
            # scripts/setup-oauth-providers.sh. If it does NOT exist these env
            # vars are simply unset (optional=true) and IdentityProvidersBootstrap
            # logs a warning + skips IdP configuration.
            - name: PLATFORM_OAUTH_GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: platform-oauth-providers
                  key: google.client-id
                  optional: true
            - name: PLATFORM_OAUTH_GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: platform-oauth-providers
                  key: google.client-secret
                  optional: true
            - name: PLATFORM_OAUTH_GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: platform-oauth-providers
                  key: github.client-id
                  optional: true
            - name: PLATFORM_OAUTH_GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: platform-oauth-providers
                  key: github.client-secret
                  optional: true
            # Cloudflare API creds for per-tenant DNS + tunnel-ingress auto-
            # provisioning (CloudflareTunnelService, called from TenantService
            # on create/delete). The `cloudflare-api` Secret is created out-of-
            # band by the operator (see scripts/deploy-beelink.sh step). When
            # the Secret is absent these env vars stay unset (optional=true) and
            # CloudflareTunnelService logs a WARN + skips — operator falls back
            # to scripts/cf-setup-tunnel.sh for manual setup.
            - name: CF_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflare-api
                  key: api-token
                  optional: true
            - name: CF_ACCOUNT_ID
              valueFrom:
                secretKeyRef:
                  name: cloudflare-api
                  key: account-id
                  optional: true
            - name: CF_TUNNEL_ID
              valueFrom:
                secretKeyRef:
                  name: cloudflare-api
                  key: tunnel-id
                  optional: true
            # SendGrid API key — used by TenantDomainAuthService to register
            # and validate per-tenant whitelabel domains. Reuses the same
            # `sendgrid-api` Secret the smtp-relay consumes (key=api-key).
            # Optional: when absent the domain-auth endpoints fail fast with
            # a clean error so operators can spot the missing wiring.
            - name: SENDGRID_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sendgrid-api
                  key: api-key
                  optional: true
            # CNPG superuser password — used by TenantDatabaseService to
            # run CREATE DATABASE / DROP DATABASE DDL when operators
            # provision per-tenant databases on the shared platform-pg
            # cluster. The Secret is created by CNPG itself
            # (see deploy/cnpg/pg-cluster.yaml: superuserSecret).
            - name: CNPG_SUPERUSER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.authManager.cnpgSuperuserSecretName | default "platform-pg-superuser-secret" }}
                  key: password
            {{- if .Values.authManager.config.cnpgSuperuserUrl }}
            - name: PLATFORM_PG_SUPERUSER_URL
              value: {{ .Values.authManager.config.cnpgSuperuserUrl | quote }}
            {{- end }}
            {{- if .Values.authManager.config.platformHost }}
            - name: KEYCLOAK_PLATFORM_HOST
              value: {{ .Values.authManager.config.platformHost | quote }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            {{- toYaml .Values.authManager.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}-auth-manager-config
            items:
              - key: application-k8s.yaml
                path: application-k8s.yaml
{{- end }}
