# Global defaults. Override per-environment via values-<env>.yaml.

global:
  imageRegistry: ""                 # set per env, e.g. "192.168.10.1:5000"
  storageClass: ""                  # set per env, e.g. "longhorn"

# ───── auth-manager (our app) ─────
authManager:
  enabled: true
  image:
    repository: auth-manager
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  replicas: 1
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
  # Name of the Keycloak StatefulSet that auth-manager is allowed to patch
  # (rolling-restart annotation) when a tenant theme ConfigMap changes.
  # Bitnami's keycloak chart names the STS as <release>-keycloak, so this
  # must match the KC helm release in the deployment namespace.
  # Override in dev (separate KC release) e.g. "platform-kc-dev-keycloak".
  kcStatefulSetName: "platform-kc-keycloak"
  config:
    activeProfile: "k8s"
    serverPort: 8080
    keycloakUrl: ""                 # auto-derived from KC service if blank (set in templates)
    postgresHost: ""                # auto-derived
    redisHost: ""                   # auto-derived
    # Override of AUTH_MANAGER_SMTP_HOST. Leave blank to fall back to the
    # default baked into application.yaml (smtp-relay.auth-platform.svc...).
    # Set explicitly when running side-by-side in a non-prod namespace that
    # shares prod's smtp-relay via cross-namespace DNS.
    smtpHost: ""
    # Public + in-cluster URLs embedded in tenant onboarding bundles.
    # Defaults are the prod values; dev overrides these to
    # auth-dev.mcp-mesh.io + the auth-platform-dev namespace.
    bundleKcBase: "https://auth.mcp-mesh.io/auth"
    bundleAdminBase: "https://auth.mcp-mesh.io/admin"
    bundleAuthMgrInClusterBase: "http://auth-platform-auth-manager.auth-platform.svc.cluster.local:8080"
  env: {}

# ───── admin-ui ─────
adminUi:
  enabled: true
  image:
    repository: admin-ui
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  replicas: 1
  service:
    type: ClusterIP
    port: 80

# ───── platform-edge (OpenResty + Lua routing layer) ─────
platformEdge:
  enabled: true
  image:
    repository: platform-edge
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  replicaCount: 2
  service:
    type: ClusterIP
    port: 80
  config:
    redisHost: ""                   # caller must set (e.g. platform-redis-master)
    adminApiTarget: ""              # defaults in template to <fullname>-auth-manager:8080
    adminUiTarget: ""               # defaults in template to <fullname>-admin-ui:80
    kcTarget: ""                    # defaults in template to platform-kc-keycloak:80
    platformHost: ""                # defaults in template to auth.mcp-mesh.io
    nginxResolver: ""               # caller must set (e.g. 10.43.0.10 for k3s)
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"

# ───── Postgres (Bitnami subchart) ─────
postgresql:
  enabled: true
  auth:
    username: authmanager
    password: changeme              # override in env
    database: authmanager           # auth-manager's DB
  primary:
    persistence:
      enabled: true
      size: 8Gi
    initdb:
      scripts:
        # KC needs its own DB; create it on first init
        00-create-keycloak-db.sql: |
          CREATE DATABASE keycloak;

# ───── Redis (Bitnami subchart) ─────
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false                  # we use Redis as a routing cache; no auth in v1
  master:
    persistence:
      enabled: false                # routing table; ephemeral OK

# ───── Keycloak (Bitnami subchart) ─────
keycloak:
  enabled: true
  image:
    tag: "26.6.1"                   # match our pin
  auth:
    adminUser: admin
    adminPassword: admin            # override in env
  postgresql:
    enabled: false                  # use the platform's postgres
  externalDatabase:
    host: ""                        # set in templates
    user: authmanager
    password: changeme
    database: keycloak
  production: false                 # use start-dev shape; faster boot for now
  proxy: edge                       # behind CF + OpenResty

# ───── smtp-relay (in-cluster SendGrid gateway for KC realm emails) ─────
# Forwards unauthenticated SMTP on :25 to smtp.sendgrid.net:587 using the
# SendGrid API key from the `sendgrid-api` Secret (key: api-key) — created
# out-of-band; if missing the deployment will CrashLoop until provided.
smtpRelay:
  enabled: true
  image:
    repository: smtp-relay
    tag: "0.1.0"
  sendgridSecretName: sendgrid-api

# ───── cloudflared (Cloudflare Tunnel connector) ─────
# The tunnel token is held in a Secret named cloudflared-token (key: token)
# that must exist in the namespace BEFORE installing this chart.
# Create it with:
#   kubectl create secret generic cloudflared-token -n auth-platform \
#     --from-literal=token='<paste the tunnel token from CF dashboard>'
cloudflared:
  enabled: true
  image:
    repository: cloudflare/cloudflared
    tag: "latest"
    pullPolicy: IfNotPresent
  replicas: 2
  secretName: "cloudflared-token"  # must pre-exist
  metricsPort: 2000
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
