# Overrides for beelink k3s deployment.
# Postgres, Redis, and Keycloak are installed as SEPARATE helm releases
# (not subcharts) — see scripts/deploy-beelink.sh for the full sequence.
# This file just covers our two custom services (auth-manager + admin-ui).

global:
  imageRegistry: "192.168.10.1:5000"
  storageClass: "longhorn"

authManager:
  image:
    repository: auth-manager
    tag: "0.1.0"
  config:
    keycloakUrl: "http://platform-kc-keycloak"
    postgresHost: "platform-pg-postgresql"
    redisHost: "platform-redis-master"

adminUi:
  image:
    repository: admin-ui
    tag: "0.1.0"

platformEdge:
  image:
    repository: platform-edge
    tag: "0.1.2"
  config:
    # Fully-qualified service DNS names — nginx's `resolver` directive does
    # NOT apply /etc/resolv.conf's `search` list to cosocket DNS lookups,
    # so short names like "auth-platform-auth-manager" would NXDOMAIN.
    redisHost: "platform-redis-master.auth-platform.svc.cluster.local"
    adminApiTarget: "auth-platform-auth-manager.auth-platform.svc.cluster.local:8080"
    adminUiTarget:  "auth-platform-admin-ui.auth-platform.svc.cluster.local:80"
    kcTarget:       "platform-kc-keycloak.auth-platform.svc.cluster.local:80"
    platformHost: "auth.mcp-mesh.io"
    kcAdminHost:  "kc.mcp-mesh.io"
