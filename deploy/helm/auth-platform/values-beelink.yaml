# Overrides for beelink k3s deployment.
# Postgres, Redis, and Keycloak are installed as SEPARATE helm releases
# (not subcharts) — see scripts/deploy-beelink.sh for the full sequence.
# This file just covers our two custom services (auth-manager + admin-ui).

global:
  imageRegistry: "192.168.10.1:5000"
  storageClass: "longhorn"

authManager:
  image:
    repository: auth-manager
    tag: "0.1.0"
  config:
    keycloakUrl: "http://platform-kc-keycloak"
    postgresHost: "platform-pg-postgresql"
    redisHost: "platform-redis-master"

adminUi:
  image:
    repository: admin-ui
    tag: "0.1.0"

platformEdge:
  image:
    repository: platform-edge
    tag: "0.1.0"
  config:
    redisHost: "platform-redis-master"
    adminApiTarget: "auth-platform-auth-manager:8080"
    adminUiTarget: "auth-platform-admin-ui:80"
    kcTarget: "platform-kc-keycloak:80"
