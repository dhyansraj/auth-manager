# Overrides for beelink k3s deployment.
# Postgres, Redis, and Keycloak are installed as SEPARATE helm releases
# (not subcharts) — see scripts/deploy-beelink.sh for the full sequence.
# This file just covers our two custom services (auth-manager + admin-ui).

global:
  imageRegistry: "192.168.10.1:5000"
  storageClass: "longhorn"

authManager:
  # 2 replicas with anti-affinity for HA. Bootstrap runners
  # (RoutingPublisherBootstrap, SystemClientTokenBootstrap,
  # PlatformRoleBootstrap, IdentityProvidersBootstrap) all run on each pod
  # at startup. Every operation is idempotent so double-execution is
  # log noise + a few extra KC API calls, not a correctness problem.
  replicas: 2
  image:
    repository: auth-manager
    tag: "0.1.85"
  config:
    keycloakUrl: "https://auth.mcp-mesh.io/auth"
    postgresHost: "platform-pg-rw"  # CNPG primary service (3-node HA cluster)
    # Standalone host (kept as fallback when redisSentinel.enabled=false)
    redisHost: ""
    # Redis HA via Sentinel: Spring queries sentinels to discover the current
    # master, then auto-follows failover. Headless DNS resolves to all 3 pods,
    # any of which can answer sentinel queries.
    redisSentinel:
      enabled: true
      master: "mymaster"
      nodes:
        - "platform-redis-node-0.platform-redis-headless.auth-platform.svc.cluster.local:26379"
        - "platform-redis-node-1.platform-redis-headless.auth-platform.svc.cluster.local:26379"
        - "platform-redis-node-2.platform-redis-headless.auth-platform.svc.cluster.local:26379"

# Credentials: empty in this overlay so the chart's `lookup`-based secret
# template preserves whatever is already in the in-cluster
# auth-platform-auth-manager Secret. Rotation is done via `kubectl patch
# secret` (or KC admin API for the realm-side change) and survives any
# `helm upgrade auth-platform` without --set overrides.
#
# To set credentials on FIRST install (before the secret exists), pass via:
#   helm upgrade --install ... --set postgresql.auth.password=... --set keycloak.auth.adminPassword=...
# OR pre-create the secret out-of-band with kubectl before running helm.
#
# scripts/deploy-beelink.sh still passes auth.adminPassword to the bitnami
# Keycloak chart (which is a separate release, not this one) via its own
# --set, so DB_PASSWORD / KC_ADMIN_PASSWORD env vars there are still required.
postgresql:
  auth:
    password: ""
keycloak:
  # Custom KC image = Bitnami KC 26.3.3 + the klausbetz Apple Identity Provider
  # SPI (providerId=apple), required for Sign in with Apple (form_post POST
  # callback that KC's stock generic-OIDC broker can't handle). Built from
  # dev/keycloak/Dockerfile. The SPI JAR is inert until an apple IdP exists, so
  # this ships the capability without enabling Apple on any tenant — prod has no
  # Apple creds in platform-oauth-providers, so the bootstrap creates no apple
  # IdP. (deploy-beelink.sh also passes global.security.allowInsecureImages=true
  # for the separate platform-kc release, which this block does not drive.)
  image:
    registry: 192.168.10.1:5000
    repository: keycloak-apple
    tag: "26.3.3-r1"
  auth:
    adminPassword: ""

adminUi:
  # 2 replicas with anti-affinity. Stateless nginx serving static files
  # — pure horizontal scaling, no coordination needed.
  replicas: 2
  image:
    repository: admin-ui
    tag: "0.1.50"

smtpRelay:
  enabled: true
  image:
    repository: smtp-relay
    tag: "0.1.0"

platformEdge:
  # 3 replicas with anti-affinity. Cluster has 5 nodes, 3 is the sweet
  # spot — survives any 2-node failure simultaneously with capacity left.
  # NOTE: template uses .replicaCount here (not .replicas like the other deploys).
  replicaCount: 3
  image:
    repository: platform-edge
    tag: "0.1.24"
  config:
    # Fully-qualified service DNS names — nginx's `resolver` directive does
    # NOT apply /etc/resolv.conf's `search` list to cosocket DNS lookups,
    # so short names like "auth-platform-auth-manager" would NXDOMAIN.
    # Redis HA via Sentinel: redisHost:redisPort points at any pod's
    # sentinel (port 26379). redis_client.lua asks SENTINEL get-master-addr-by-name
    # at runtime, caches the result for 5s, and connects to the current master.
    # On failover the cache TTL forces re-discovery; on a stale READONLY error
    # the client invalidates the cache so the next call hits the new master.
    redisHost: "platform-redis.auth-platform.svc.cluster.local"
    redisPort: 26379
    redisSentinelEnabled: true
    redisSentinelMaster: "mymaster"
    adminApiTarget: "auth-platform-auth-manager.auth-platform.svc.cluster.local:8080"
    adminUiTarget:  "auth-platform-admin-ui.auth-platform.svc.cluster.local:80"
    kcTarget:       "platform-kc-keycloak.auth-platform.svc.cluster.local:80"
    platformHost: "auth.mcp-mesh.io"
    # Optional: change the default body-size cap for routes that don't set
    # an explicit maxBodyMb. Default 25 MB. Hard upper bound (set on nginx
    # http{} block in nginx.conf): 100 MB (CF Free tunnel ceiling).
    routeDefaultMaxBodyMb: 25
    # k3s cluster DNS (kube-dns/coredns ClusterIP). Single resolver only —
    # including 127.0.0.11 here caused intermittent 503s when nginx tried it.
    nginxResolver: "10.43.0.10"
