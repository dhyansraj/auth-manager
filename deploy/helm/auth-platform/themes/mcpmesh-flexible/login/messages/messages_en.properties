# mcpmesh-flexible parent theme — slot keys.
# Tenants override these via their own messages_en.properties (managed by
# auth-manager when they save layout/slots in the Branding tab).
#
# Available slot keys (all default to empty):
#   mcpmeshSlotMarketingLeftHtml
#   mcpmeshSlotMarketingRightHtml
#   mcpmeshSlotAboveFormHtml
#   mcpmeshSlotBelowFormHtml
#   mcpmeshSlotFooterHtml
#
# Layout variant key (default = centered):
#   mcpLayoutVariant   (values: centered | split-left | split-right | bleed)
mcpLayoutVariant=centered
mcpmeshSlotMarketingLeftHtml=
mcpmeshSlotMarketingRightHtml=
mcpmeshSlotAboveFormHtml=
mcpmeshSlotBelowFormHtml=
mcpmeshSlotFooterHtml=
