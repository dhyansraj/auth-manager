# Overrides layered on top of Bitnami's keycloak chart for the platform-kc
# release. The base flags (image, externalDatabase, KC_HOSTNAME, etc.) are
# still set via --set in scripts/deploy-beelink.sh; this file ONLY carries
# the additions for the per-tenant theme subsystem:
#
#   - extraInitContainers: a small kubectl/bash image that materializes
#     every theme ConfigMap (label mcpmesh/theme=true) into a directory
#     tree under /opt/keycloak/themes/ before KC starts.
#   - extraVolumes: a shared emptyDir mounted by both the init container
#     (write side) and the KC container (read side).
#   - serviceAccount.create + RBAC patches so the init container has
#     get,list on ConfigMaps in its namespace.

serviceAccount:
  create: true
  automountServiceAccountToken: true

# RBAC needed by the init container to list theme ConfigMaps. Bitnami's KC
# chart doesn't expose Role/RoleBinding fields directly, so we layer them
# via extraDeploy.
extraDeploy:
  - |
    apiVersion: rbac.authorization.k8s.io/v1
    kind: Role
    metadata:
      name: platform-kc-theme-reader
      namespace: {{ .Release.Namespace }}
    rules:
    - apiGroups: [""]
      resources: ["configmaps"]
      verbs: ["get", "list", "watch"]
  - |
    apiVersion: rbac.authorization.k8s.io/v1
    kind: RoleBinding
    metadata:
      name: platform-kc-theme-reader
      namespace: {{ .Release.Namespace }}
    subjects:
    - kind: ServiceAccount
      name: {{ include "common.names.fullname" . }}
      namespace: {{ .Release.Namespace }}
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: Role
      name: platform-kc-theme-reader

# Materializer init container. Runs once per pod start: enumerates ConfigMaps
# labeled mcpmesh/theme=true, decodes the __-encoded path keys, and writes
# the directory tree directly into Bitnami's shared empty-dir volume at
# the app-themes-dir subPath — which the KC main container mounts at
# /opt/bitnami/keycloak/themes.
#
# NOTE: we DO NOT use extraVolumes/extraVolumeMounts. Bitnami's KC chart
# mounts a single shared `empty-dir` volume into the main container with
# subPaths for every writable directory (tmp, conf, providers, themes, ...).
# Adding our own extraVolumeMount at /opt/bitnami/keycloak/themes is
# silently ignored by the chart's main-container mount-merge logic — only
# the existing subPath mount survives. So we materialize INTO that shared
# volume's app-themes-dir subPath instead, which IS what KC reads.
initContainers:
  - name: theme-materializer
    image: docker.io/bitnamilegacy/kubectl:1.30
    imagePullPolicy: IfNotPresent
    command: ["/bin/bash", "-eu", "-o", "pipefail", "-c"]
    args:
      - |
        echo "theme-materializer: starting at $(date -u +%FT%TZ)"
        TARGET=/emptydir/app-themes-dir
        # The prepare-write-dirs init container runs before us and creates
        # this directory, but defensive mkdir to be safe.
        mkdir -p "$TARGET"
        cm_list=$(kubectl get cm -n "$POD_NAMESPACE" -l mcpmesh/theme=true -o json)
        count=$(echo "$cm_list" | jq '.items | length')
        echo "theme-materializer: found $count tenant theme ConfigMap(s); target=$TARGET"
        echo "$cm_list" | jq -c '.items[]' | while read -r cm_json; do
          cm_name=$(echo "$cm_json" | jq -r '.metadata.name')
          # ConfigMap name = "theme-<tenant-dir>" → strip leading "theme-".
          tenant_dir="${cm_name#theme-}"
          target="$TARGET/$tenant_dir"
          mkdir -p "$target"
          echo "theme-materializer:  → $tenant_dir"
          # Text files (data:)
          echo "$cm_json" | jq -r '.data // {} | to_entries[] | @base64' | while read -r row; do
            key=$(echo "$row" | base64 -d | jq -r '.key')
            val=$(echo "$row" | base64 -d | jq -r '.value')
            path="${key//__//}"
            mkdir -p "$target/$(dirname "$path")"
            printf '%s' "$val" > "$target/$path"
          done
          # Binary files (binaryData:) — base64-encoded by the apiserver
          echo "$cm_json" | jq -r '.binaryData // {} | to_entries[] | @base64' | while read -r row; do
            key=$(echo "$row" | base64 -d | jq -r '.key')
            val=$(echo "$row" | base64 -d | jq -r '.value')
            path="${key//__//}"
            mkdir -p "$target/$(dirname "$path")"
            echo "$val" | base64 -d > "$target/$path"
          done
        done
        echo "theme-materializer: done; $(find "$TARGET" -mindepth 1 -maxdepth 1 -type d | wc -l) tenant theme(s) materialized"
    env:
      - name: POD_NAMESPACE
        valueFrom:
          fieldRef:
            fieldPath: metadata.namespace
    volumeMounts:
      - name: empty-dir
        mountPath: /emptydir
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "200m"
        memory: "128Mi"

# ===== Clustering: pod anti-affinity =====
# When replicaCount > 1, KC pods MUST spread across nodes — otherwise a
# single-node failure kills all replicas (defeats the whole point of HA).
# Hard requirement: refuse to schedule if no other node has room. Our
# cluster has 5 nodes so this is always satisfiable.
#
# Note: with replicaCount=1 this is a no-op (only one pod to schedule),
# but we land it now so it's in place before scaling to 2+.
affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values: [keycloak]
        topologyKey: kubernetes.io/hostname

# ===== PodDisruptionBudget =====
# Prevents k8s from voluntarily evicting too many KC pods at once during
# node drain / upgrade. minAvailable=1 means we always keep at least one
# pod up. After replicaCount=3 is stable, tightening to minAvailable=2
# is the right move (separate follow-up).
pdb:
  create: true
  minAvailable: 1
